<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Betaling – Thon Hotel Slottsparken</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .checkout-page {
            padding-top: 130px;
            background: #f8fafc;
            min-height: 100vh;
        }
        .progress-bar {
            max-width: 800px;
            margin: 0 auto 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .step {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            color: #64748b;
        }
        .step.active { color: var(--marine-blue); }
        .step.completed { color: #10b981; }
        .step-circle {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            border: 3px solid #e2e8f0;
        }
        .step.completed .step-circle { background: #10b981; color: white; border-color: #10b981; }
        .step-line { flex: 1; height: 3px; background: #e2e8f0; max-width: 120px; }
        .step.completed ~ .step-line { background: #10b981; }

        .checkout-container {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 60px;
            padding: 0 40px;
        }
        @media (max-width: 900px) {
            .checkout-container { grid-template-columns: 1fr; }
        }

        .form-section h2, .summary-section h2 {
            font-size: 1.6rem;
            margin-bottom: 24px;
            color: var(--marine-blue);
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .input-grid input, .input-grid textarea {
            width: 100%;
            padding: 16px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
        }
        .input-grid textarea { grid-column: span 2; height: 120px; resize: vertical; }

        .booking-box {
            background: white;
            border-radius: 20px;
            padding: 28px;
            box-shadow: var(--shadow);
        }
        .hotel-info {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }
        .hotel-info img {
            width: 64px;
            height: 64px;
            object-fit: cover;
            border-radius: 12px;
        }
        .date-boxes {
            display: flex;
            gap: 16px;
            margin: 24px 0;
        }
        .date-box {
            flex: 1;
            background: #f8fafc;
            padding: 14px;
            border-radius: 12px;
            text-align: center;
        }
        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.4rem;
            font-weight: 700;
            padding-top: 20px;
            border-top: 2px solid #f1f5f9;
        }
        .total-row .total-label { color: var(--marine-blue); }
        .total-row .total-amount { color: var(--thon-red); }

        .pay-btn {
            width: 100%;
            margin-top: 30px;
            padding: 18px;
            background: var(--thon-red);
            color: white;
            font-size: 1.25rem;
            font-weight: 700;
            border: none;
            border-radius: 14px;
            cursor: pointer;
        }
        .pay-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(227,6,19,0.4);
        }
    </style>
</head>
<body>

<button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Åpne meny">
    <span></span><span></span><span></span>
</button>

<header class="booking-bar" id="booking-bar">
    <div class="container">
        <h1><a href="index.html" style="color:inherit;text-decoration:none;">Thon Hotel Slottsparken</a></h1>
        <button class="header-close-btn" id="header-close-btn">✕</button>
        <nav class="main-nav">
            <a href="index.html">Hjem</a>
            <a href="opplevelser.html">Opplevelser</a>
        </nav>
    </div>
</header>

<section class="checkout-page">
    <!-- Progress bar -->
    <div class="progress-bar">
        <div class="step completed"><div class="step-circle">✓</div> Velg rom</div>
        <div class="step-line"></div>
        <div class="step completed"><div class="step-circle">✓</div> Tilleggspakker</div>
        <div class="step-line"></div>
        <div class="step active"><div class="step-circle">3</div> Betaling</div>
        <div class="step-line"></div>
        <div class="step"><div class="step-circle">4</div> Bekreftelse</div>
    </div>

    <div class="checkout-container">
        <!-- VENSTRE: Dine opplysninger -->
        <div class="form-section">
            <h2>Dine opplysninger</h2>
            <div class="input-grid">
                <div>
                    <label>Fornavn *</label>
                    <input type="text" id="fornavn" value="Ola" required>
                </div>
                <div>
                    <label>Etternavn *</label>
                    <input type="text" id="etternavn" value="Nordmann" required>
                </div>
                <div>
                    <label>E-postadresse *</label>
                    <input type="email" id="epost" value="ola@epost.no" required>
                </div>
                <div>
                    <label>Telefonnummer *</label>
                    <input type="tel" id="telefon" value="+47 900 00 000" required>
                </div>
                <div style="grid-column: span 2;">
                    <label>Spesielle ønsker (valgfritt)</label>
                    <textarea id="onsker" placeholder="F.eks. tidlig innsjekk, allergi, etasjeønske..."></textarea>
                </div>
            </div>
        </div>

        <!-- HØYRE: Din booking -->
        <div class="summary-section">
            <h2>Din booking</h2>
            <div class="booking-box" id="booking-summary">
                <!-- Fylles dynamisk med Javascript -->
            </div>

            <button onclick="completeBooking()" class="pay-btn">Bekreft og betal nå</button>
        </div>
    </div>
</section>

<!-- Tilbake-lenke (matcher screenshot) -->
<div style="position:fixed;top:20px;left:40px;z-index:300;">
    <a href="index.html" style="color:#3b82f6;text-decoration:none;font-weight:600;display:flex;align-items:center;gap:6px;">
        ← Tilbake til booking
    </a>
</div>

<script src="Javascript.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const data = JSON.parse(sessionStorage.getItem('thon_booking'));
        const summaryEl = document.getElementById('booking-summary');

        if (!data) {
            summaryEl.innerHTML = `<p>Ingen booking funnet. <a href="index.html">Gå tilbake</a></p>`;
            return;
        }

        let extrasHTML = data.extras.map(e => 
            `<div style="display:flex;justify-content:space-between;margin:8px 0;">
                <span>✓ ${e.name}</span>
                <span>+${e.price} kr</span>
            </div>`
        ).join('');

        let total = data.roomPrice + data.extras.reduce((sum, e) => sum + e.price, 0);

        summaryEl.innerHTML = `
            <div style="display:flex;gap:16px;align-items:center;margin-bottom:20px;">
                <div style="background:#f1f5f9;width:64px;height:64px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:28px;">🏨</div>
                <div>
                    <strong style="font-size:1.3rem;">Thon Hotel Slottsparken</strong><br>
                    <span style="color:#64748b;">Wergelandsveien 5, Oslo</span><br>
                    <span style="color:#f59e0b;">★★★★</span> 4-stjernes hotell
                </div>
            </div>

            <div style="background:#f8fafc;border-radius:12px;padding:16px;margin:24px 0;">
                <strong>${data.roomName}</strong><br>
                <small style="color:#64748b;">Rom • per natt</small>
            </div>

            <div class="date-boxes">
                <div class="date-box">
                    <small>INNSJEKK</small><br>
                    <strong>${data.checkin || '-'}</strong>
                </div>
                <div class="date-box">
                    <small>UTSJEKK</small><br>
                    <strong>${data.checkout || '-'}</strong>
                </div>
            </div>

            ${extrasHTML}

            <div class="total-row">
                <div class="total-label">Totalt <span style="background:#fee2e2;color:#e11d48;padding:2px 10px;border-radius:9999px;font-size:0.85rem;">1 natt</span></div>
                <div class="total-amount">${total.toLocaleString('no-NO')} kr</div>
            </div>
        `;
    });

    function completeBooking() {
        const fornavn = document.getElementById('fornavn').value;
        const etternavn = document.getElementById('etternavn').value;
        
        if (!fornavn || !etternavn) {
            alert('Vennligst fyll ut fornavn og etternavn.');
            return;
        }

        alert(`🎉 Takk, ${fornavn}! Din booking er nå bekreftet og betalt.\n\n(Dette er en prototype – i produksjon ville betaling gått via Stripe/Vipps osv.)`);
        sessionStorage.removeItem('thon_booking');
        window.location.href = 'index.html';
    }

    // Hamburger-meny (samme som andre sider)
    document.getElementById('mobile-menu-btn').addEventListener('click', () => {
        document.getElementById('booking-bar').classList.toggle('menu-open');
    });
    document.getElementById('header-close-btn').addEventListener('click', () => {
        document.getElementById('booking-bar').classList.remove('menu-open');
    });
</script>
</body>
</html>
